AWSTemplateFormatVersion: '2010-09-09'
Description: Auto Scaling Lab Week 3 - Web Application with ALB and ASG

Resources:

  # ── Layer 1: Networking ────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: asg-lab-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: asg-lab-igw

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: asg-lab-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: asg-lab-public-subnet-2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: asg-lab-private-subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: asg-lab-private-subnet-2

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: asg-lab-nat-gw

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: asg-lab-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: asg-lab-private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ── Layer 2: Security Groups ───────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic from the internet to the ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: asg-lab-alb-sg

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic only from the ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: asg-lab-ec2-sg

  # ── Layer 3: Load Balancer ─────────────────────────────────────────────────

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: asg-lab-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
      Tags:
        - Key: Name
          Value: asg-lab-alb

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: asg-lab-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: asg-lab-tg

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── Layer 4: Compute & Auto Scaling ───────────────────────────────────────

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: asg-lab-lt
      LaunchTemplateData:
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
        InstanceType: t3.micro
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            yum update -y
            amazon-linux-extras install epel -y
            yum install -y httpd stress

            systemctl enable httpd
            systemctl start httpd

            INSTANCE_ID=$(curl -sf http://169.254.169.254/latest/meta-data/instance-id)
            PRIVATE_IP=$(curl -sf http://169.254.169.254/latest/meta-data/local-ipv4)
            AZ=$(curl -sf http://169.254.169.254/latest/meta-data/placement/availability-zone)

            cat > /var/www/html/index.html <<'HTML'
            <!DOCTYPE html>
            <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="5">
              <title>Auto Scaling Demo</title>
              <style>
                body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 0 20px; }
                .card { background: #f4f6f9; border-radius: 10px; padding: 30px; margin-bottom: 20px; }
                h1 { color: #1a1a2e; }
                table { width: 100%; border-collapse: collapse; }
                td { padding: 8px 12px; border-bottom: 1px solid #ddd; }
                td:first-child { font-weight: 600; color: #555; width: 150px; }
                .stress-btn {
                  display: inline-block; margin-top: 20px; padding: 14px 32px;
                  background: #2980b9; color: white; border: none; border-radius: 8px;
                  font-size: 16px; cursor: pointer; text-decoration: none;
                }
                .stress-btn:hover { background: #c0392b; }
                .note { font-size: 13px; color: #777; margin-top: 8px; }
              </style>
            </head>
            <body>
              <h1> Auto Scaling Demo</h1>
              <div class="card">
                <h2>Instance Information</h2>
                <table>
                  <tr><td>Instance ID</td><td>INSTANCE_ID_PLACEHOLDER</td></tr>
                  <tr><td>Private IP</td><td>PRIVATE_IP_PLACEHOLDER</td></tr>
                  <tr><td>Availability Zone</td><td>AZ_PLACEHOLDER</td></tr>
                </table>
              </div>
              <div class="card">
                <h2>CPU Stress Test</h2>
                <p>Click the button below to spike CPU on <strong>this instance</strong>.
                   Watch the Auto Scaling Group detect the load and launch new instances.</p>
                <a href="/stress" class="stress-btn"> Trigger CPU Stress</a>
                <p class="note">Runs <code>stress --cpu 2 --timeout 300</code> in the background.
                   Refresh this page every few seconds — the Instance ID above will change
                   as new instances join the target group.</p>
              </div>
            </body>
            </html>
            HTML

            sed -i "s/INSTANCE_ID_PLACEHOLDER/$INSTANCE_ID/g" /var/www/html/index.html
            sed -i "s/PRIVATE_IP_PLACEHOLDER/$PRIVATE_IP/g"   /var/www/html/index.html
            sed -i "s/AZ_PLACEHOLDER/$AZ/g"                   /var/www/html/index.html

            # Enable CGI in Apache
            sed -i 's|#AddHandler cgi-script .cgi|AddHandler cgi-script .cgi .sh|' /etc/httpd/conf/httpd.conf
            mkdir -p /var/www/cgi-bin

            cat > /var/www/html/.htaccess <<'HTACCESS'
            Options +ExecCGI
            HTACCESS

            cat > /var/www/cgi-bin/stress.sh <<'CGISCRIPT'
            #!/bin/bash
            echo "Content-Type: text/html"
            echo ""
            stress --cpu 2 --timeout 300 &
            echo "<h2>Stress running for 300s on $(hostname)</h2>"
            CGISCRIPT
            chmod +x /var/www/cgi-bin/stress.sh

            # Redirect /stress to cgi
            cat >> /etc/httpd/conf/httpd.conf <<'APACHECONF'

            Alias /stress /var/www/cgi-bin/stress.sh
            <Directory /var/www/cgi-bin>
                Options +ExecCGI
                AddHandler cgi-script .sh
            </Directory>
            APACHECONF

            systemctl restart httpd

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: asg-lab-asg
      MinSize: '1'
      DesiredCapacity: '1'
      MaxSize: '4'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: asg-lab-instance
          PropagateAtLaunch: true

  ScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 30.0

Outputs:
  ALBEndpoint:
    Description: Public URL of the Application Load Balancer
    Value: !Sub 'http://${ALB.DNSName}'
