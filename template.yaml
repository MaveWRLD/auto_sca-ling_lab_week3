AWSTemplateFormatVersion: '2010-09-09'
Description: Auto Scaling Lab Week 3 - Web Application with ALB and ASG

Resources:

  # ── Layer 1: Networking ────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: asg-lab-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: asg-lab-igw

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: asg-lab-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: asg-lab-public-subnet-2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: asg-lab-private-subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: asg-lab-private-subnet-2

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: asg-lab-nat-gw

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: asg-lab-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: asg-lab-private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ── Layer 2: Security Groups ───────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic from the internet to the ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: asg-lab-alb-sg

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic only from the ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: asg-lab-ec2-sg

  # ── Layer 3: Load Balancer ─────────────────────────────────────────────────

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: asg-lab-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
      Tags:
        - Key: Name
          Value: asg-lab-alb

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: asg-lab-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: asg-lab-tg

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── Layer 4: Compute & Auto Scaling ───────────────────────────────────────

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: asg-lab-lt
      LaunchTemplateData:
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
        InstanceType: t3.micro
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e
            dnf update -y
            dnf install -y httpd stress
            systemctl enable httpd
            systemctl start httpd

            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
            PRIVATE_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/local-ipv4)
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)

            cat > /var/www/html/index.html <<'HTML'
            <!DOCTYPE html>
            <html>
            <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="5">
              <title>Auto Scaling Lab</title>
              <style>
                body { font-family: sans-serif; background: #1a1a2e; color: #eee;
                       display: flex; flex-direction: column; align-items: center;
                       padding: 40px 20px; margin: 0; }
                h1   { font-size: 1.3rem; letter-spacing: 2px; margin-bottom: 28px; }
                .stats { display: flex; gap: 16px; margin-bottom: 36px; flex-wrap: wrap; justify-content: center; }
                .stat  { background: #16213e; border: 1px solid #0f3460; border-radius: 8px;
                         padding: 20px 28px; text-align: center; min-width: 140px; }
                .stat .val { font-size: 1rem; font-weight: 700; color: #e94560; word-break: break-all; }
                .stat .lbl { font-size: 0.7rem; color: #aaa; margin-top: 8px; letter-spacing: 2px; }
                .stress-btn { background: #e94560; color: #fff; border: none; border-radius: 8px;
                              padding: 16px 48px; font-size: 1rem; cursor: pointer;
                              letter-spacing: 2px; font-weight: 600; }
                .stress-btn:hover { background: #c73652; }
                .note { margin-top: 20px; font-size: 0.78rem; color: #666; text-align: center; }
              </style>
            </head>
            <body>
              <h1>AUTO SCALING LAB — WEEK 3</h1>
              <div class="stats">
                <div class="stat">
                  <div class="val">INSTANCE_ID_PLACEHOLDER</div>
                  <div class="lbl">INSTANCE ID</div>
                </div>
                <div class="stat">
                  <div class="val">PRIVATE_IP_PLACEHOLDER</div>
                  <div class="lbl">PRIVATE IP</div>
                </div>
                <div class="stat">
                  <div class="val">AZ_PLACEHOLDER</div>
                  <div class="lbl">AZ</div>
                </div>
              </div>
              <form method="POST" action="/stress">
                <button type="submit" class="stress-btn">STRESS CPU NOW</button>
              </form>
              <p class="note">&#8635; Refreshes every 5s — watch Instance ID change as ASG scales up</p>
            </body>
            </html>
            HTML

            sed -i "s/INSTANCE_ID_PLACEHOLDER/$INSTANCE_ID/g" /var/www/html/index.html
            sed -i "s/PRIVATE_IP_PLACEHOLDER/$PRIVATE_IP/g"   /var/www/html/index.html
            sed -i "s/AZ_PLACEHOLDER/$AZ/g"                   /var/www/html/index.html

            mkdir -p /var/www/cgi-bin
            cat > /var/www/cgi-bin/stress.sh <<'CGISCRIPT'
            #!/bin/bash
            echo "Content-Type: text/html"
            echo ""
            stress --cpu 2 --timeout 300 &
            echo "<html><head><meta http-equiv='refresh' content='2;url=/'></head>"
            echo "<body style='font-family:sans-serif;background:#1a1a2e;color:#eee;text-align:center;padding:60px'>"
            echo "<p>Stress running 300s on $(hostname). Redirecting...</p>"
            echo "</body></html>"
            CGISCRIPT
            chmod +x /var/www/cgi-bin/stress.sh

            cat >> /etc/httpd/conf/httpd.conf <<'APACHECONF'

            <Directory /var/www/cgi-bin>
                Options +ExecCGI
                AddHandler cgi-script .sh
            </Directory>
            ScriptAlias /stress /var/www/cgi-bin/stress.sh
            APACHECONF

            systemctl restart httpd

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: asg-lab-asg
      MinSize: '1'
      DesiredCapacity: '1'
      MaxSize: '4'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: asg-lab-instance
          PropagateAtLaunch: true

  ScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 30.0

Outputs:
  ALBEndpoint:
    Description: Public URL of the Application Load Balancer
    Value: !Sub 'http://${ALB.DNSName}'
