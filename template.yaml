AWSTemplateFormatVersion: '2010-09-09'
Description: Auto Scaling Lab Week 3 - Web Application with ALB and ASG

Resources:

  # ── Layer 1: Networking ────────────────────────────────────────────────────

  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: asg-lab-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: asg-lab-igw

  IGWAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: asg-lab-public-subnet-1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: asg-lab-public-subnet-2

  PrivateSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: asg-lab-private-subnet-1

  PrivateSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: asg-lab-private-subnet-2

  NatEIP:
    Type: AWS::EC2::EIP
    DependsOn: IGWAttachment
    Properties:
      Domain: vpc

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEIP.AllocationId
      SubnetId: !Ref PublicSubnet1
      Tags:
        - Key: Name
          Value: asg-lab-nat-gw

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: asg-lab-public-rt

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref PublicRouteTable

  PublicSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref PublicRouteTable

  PrivateRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags:
        - Key: Name
          Value: asg-lab-private-rt

  PrivateRoute:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref PrivateRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      NatGatewayId: !Ref NatGateway

  PrivateSubnet1Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet1
      RouteTableId: !Ref PrivateRouteTable

  PrivateSubnet2Association:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PrivateSubnet2
      RouteTableId: !Ref PrivateRouteTable

  # ── Layer 2: Security Groups ───────────────────────────────────────────────

  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic from the internet to the ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: asg-lab-alb-sg

  EC2SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow HTTP traffic only from the ALB
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ALBSecurityGroup
      Tags:
        - Key: Name
          Value: asg-lab-ec2-sg

  # ── Layer 3: Load Balancer ─────────────────────────────────────────────────

  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: asg-lab-alb
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !Ref ALBSecurityGroup
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: 'true'
      Tags:
        - Key: Name
          Value: asg-lab-alb

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: asg-lab-tg
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VPC
      TargetType: instance
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Tags:
        - Key: Name
          Value: asg-lab-tg

  Listener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ── Layer 4: Compute & Auto Scaling ───────────────────────────────────────

  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: asg-lab-lt
      LaunchTemplateData:
        ImageId: '{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}'
        InstanceType: t3.micro
        SecurityGroupIds:
          - !Ref EC2SecurityGroup
        MetadataOptions:
          HttpTokens: required
          HttpEndpoint: enabled
        UserData:
          Fn::Base64: !Sub |
            #!/bin/bash
            set -e

            dnf update -y
            dnf install -y httpd stress

            systemctl enable httpd
            systemctl start httpd

            TOKEN=$(curl -s -X PUT "http://169.254.169.254/latest/api/token" -H "X-aws-ec2-metadata-token-ttl-seconds: 21600")
            INSTANCE_ID=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/instance-id)
            PRIVATE_IP=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/local-ipv4)
            AZ=$(curl -s -H "X-aws-ec2-metadata-token: $TOKEN" http://169.254.169.254/latest/meta-data/placement/availability-zone)

            cat > /var/www/html/index.html <<'HTML'
            <!DOCTYPE html>
            <html lang="en">
            <head>
              <meta charset="UTF-8">
              <meta http-equiv="refresh" content="5">
              <title>Auto Scaling Demo</title>
              <style>
                *{box-sizing:border-box;margin:0;padding:0}
                body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f8fafc;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 20px}
                .wrap{width:100%;max-width:520px}
                .header{display:flex;align-items:center;gap:10px;margin-bottom:22px}
                .status-dot{width:9px;height:9px;border-radius:50%;background:#22c55e;flex-shrink:0}
                .title{font-size:18px;font-weight:700;color:#0f172a;letter-spacing:-0.3px}
                .refresh{margin-left:auto;font-size:10px;color:#94a3b8;background:#e2e8f0;padding:2px 7px;border-radius:10px}
                .card{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:18px 20px;margin-bottom:14px}
                .card-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.8px;color:#94a3b8;margin-bottom:12px}
                .row{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f1f5f9}
                .row:last-child{border-bottom:none}
                .lbl{font-size:12px;color:#64748b;font-weight:500}
                .val{font-size:12px;color:#0f172a;font-weight:600;font-family:'SFMono-Regular',Consolas,monospace}
                .az{background:#fff7ed;color:#ea580c;border:1px solid #fed7aa;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600}
                .btn{display:block;width:100%;padding:11px;background:#f97316;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;text-align:center;text-decoration:none;letter-spacing:0.2px}
                .btn:hover{background:#ea580c}
              </style>
            </head>
            <body>
              <div class="wrap">
                <div class="header">
                  <div class="status-dot"></div>
                  <span class="title">Auto Scaling Demo</span>
                  <span class="refresh">&#8635; 5s</span>
                </div>
                <div class="card">
                  <div class="card-title">Instance Information</div>
                  <div class="row"><span class="lbl">Instance ID</span><span class="val">INSTANCE_ID_PLACEHOLDER</span></div>
                  <div class="row"><span class="lbl">Private IP</span><span class="val">PRIVATE_IP_PLACEHOLDER</span></div>
                  <div class="row"><span class="lbl">Availability Zone</span><span class="az">AZ_PLACEHOLDER</span></div>
                </div>
                <div class="card">
                  <div class="card-title">CPU Stress Test</div>
                  <a href="/stress" class="btn">&#128293; Trigger CPU Stress</a>
                </div>
              </div>
            </body>
            </html>
            HTML

            sed -i "s/INSTANCE_ID_PLACEHOLDER/$INSTANCE_ID/g" /var/www/html/index.html
            sed -i "s/PRIVATE_IP_PLACEHOLDER/$PRIVATE_IP/g"   /var/www/html/index.html
            sed -i "s/AZ_PLACEHOLDER/$AZ/g"                   /var/www/html/index.html

            # Enable CGI in Apache
            sed -i 's|#AddHandler cgi-script .cgi|AddHandler cgi-script .cgi .sh|' /etc/httpd/conf/httpd.conf
            mkdir -p /var/www/cgi-bin

            cat > /var/www/html/.htaccess <<'HTACCESS'
            Options +ExecCGI
            HTACCESS

            cat > /var/www/cgi-bin/stress.sh <<'CGISCRIPT'
            #!/bin/bash
            echo "Content-Type: text/html"
            echo ""
            stress --cpu 2 --timeout 300 &
            echo "<h2>Stress running for 300s on $(hostname)</h2>"
            CGISCRIPT
            chmod +x /var/www/cgi-bin/stress.sh

            # Redirect /stress to cgi
            cat >> /etc/httpd/conf/httpd.conf <<'APACHECONF'

            Alias /stress /var/www/cgi-bin/stress.sh
            <Directory /var/www/cgi-bin>
                Options +ExecCGI
                AddHandler cgi-script .sh
            </Directory>
            APACHECONF

            systemctl restart httpd

  AutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: asg-lab-asg
      MinSize: '1'
      DesiredCapacity: '1'
      MaxSize: '4'
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      VPCZoneIdentifier:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      TargetGroupARNs:
        - !Ref TargetGroup
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      Tags:
        - Key: Name
          Value: asg-lab-instance
          PropagateAtLaunch: true

  ScalingPolicy:
    Type: AWS::AutoScaling::ScalingPolicy
    Properties:
      AutoScalingGroupName: !Ref AutoScalingGroup
      PolicyType: TargetTrackingScaling
      TargetTrackingConfiguration:
        PredefinedMetricSpecification:
          PredefinedMetricType: ASGAverageCPUUtilization
        TargetValue: 30.0

Outputs:
  ALBEndpoint:
    Description: Public URL of the Application Load Balancer
    Value: !Sub 'http://${ALB.DNSName}'
